<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Look up restaurant health inspection grades for NYC, Seattle, San Francisco, and Los Angeles.">
    <meta property="og:title" content="Is there poop in it?">
    <meta property="og:description" content="Look up restaurant health inspection grades for NYC, Seattle, San Francisco, and Los Angeles.">
    <meta property="og:url" content="https://www.istherepoopinit.com">
    <meta property="og:type" content="website">
    <link rel="icon" href="favicon.ico">

    <title>Is there poop in it?</title>

    <!-- Bootstrap core CSS -->
    <link href="dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom styles for this template -->
    <link href="cover.css" rel="stylesheet">

    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-43640404-3"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'UA-43640404-3');
    </script>
    <!-- END Google Analytics -->

  </head>

  <body>

    <div class="site-wrapper">

      <div class="site-wrapper-inner">

        <div class="cover-container">

          <div class="masthead clearfix"></div>

          <div class="inner cover">
            <h1 class="cover-heading">Is there poop in it?</h1>
            <p class="lead">Enter a restaurant name below to see if there may be poop in it.*</p>
            <p class="lead">
              <form id="search" method="POST">
                <div>
                  <label for="q" class="sr-only">Restaurant name</label>
                  <input name="q" id="q" type="search" class="query form-control" placeholder="Restaurant Name Here" aria-label="Restaurant name" />
                </div>
                <div class="col-sm">
                  <label for="city">Location:</label>
                  <select name="city" id="city">
                    <option value="LAC">Los Angeles, CA</option>
                    <option value="NYC">New York City, NY</option>
                    <option value="SFO">San Francisco, CA</option>
                    <option value="SEA">Seattle, WA</option>
                  </select>
                  <button type="submit" class="btn btn-primary">Submit</button>
                </div>
              </form>
            </p>
            <span class="disclaimer">*It's very unlikely that your food has poop in it.</span>
          </div>

          <div id="loading" style="display:none">
            <div id="spinner"></div>
            <p>Searching&hellip;</p>
          </div>

          <div class="lead" id="results_wrapper" style="display: none;">
            <button id="new-search" class="btn btn-secondary">New Search</button>
            <div class="lead" id="rest_grades"></div>
            <div class="lead" id="scale"></div>
          </div>

          <div class="mastfoot">
            <div class="inner">
              <p></p>
            </div>
          </div>

        </div>

      </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="rater.js"></script>
  </body>
</html>
